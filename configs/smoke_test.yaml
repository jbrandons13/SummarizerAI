assembly:
  clip_buffer_seconds: 0.5
  clip_duration_mode: match_audio
broll:
  matching_threshold: 0.6
  max_broll_duration: 5.0
keyframe_extraction:
  frames_per_scene_caption: 3
  frames_per_scene_siglip: 5
  min_frames_short_scene: 1
  similarity_pooling: top_k_mean
  top_k: 2
llm:
  backend: groq
  groq:
    model_name: llama-3.3-70b-versatile
    temperature: 0.0
  local:
    model_name: Qwen/Qwen2.5-14B-Instruct-AWQ
    temperature: 0.0
  retry_count: 3
models:
  clip:
    model_name: ViT-L-14
  qwen_vl:
    model_name: Qwen/Qwen2.5-VL-7B-Instruct-AWQ
  sentence_transformer:
    model_name: all-MiniLM-L12-v2
  siglip:
    model_name: google/siglip2-so400m-patch16-naflex
  transcription_alignment:
    model_name: WAV2VEC2_ASR_BASE_960H
  whisper:
    batch_size: 16
    language: en
    model_name: large-v3
paths:
  intermediate_dir: data/intermediate
  output_dir: data/output
  raw_data_dir: data/raw
retrieval:
  ccma_c_max: 3
  ccma_reuse_penalty: 0.2
  # Note: CCMA shares jump_penalty and backward_penalty with DP (see dp_* below)
  cv_align_k_max: 3
  cv_align_lambda: 0.1
  dp_backward_penalty: 0.5
  dp_jump_penalty: 0.01
  dp_reuse_bonus: 0.01
  hungarian_reuse_penalty: 0.2
  matching_algorithm: dp
  temporal_sigma: 30.0
  temporal_weight: 0.3
  use_temporal_guidance: true
summarization:
  max_output_duration_seconds: 90
  min_segment_duration_seconds: 3.0
  relevance_threshold: 0.7
subtitle:
  enabled: true
  style: "FontName=Liberation Sans,FontSize=20,PrimaryColour=&H00FFFFFF,BackColour=&H80000000,BorderStyle=4,Outline=0,Shadow=0,MarginV=30"
tts:
  backend: kokoro
  dia_model: nari-labs/Dia-1.6B-0626
  kokoro_speed: 1.05
  kokoro_voice: af_heart
  loudness_lufs: -18
  sample_rate: 24000
  silence_padding_ms: 150
vram:
  device_id: 0
  limit_gb: 22.0
