# Default configuration for Video Summarizer AI Pipeline

paths:
  raw_data_dir: "data/raw"
  intermediate_dir: "data/intermediate"
  output_dir: "data/output"

models:
  whisper:
    model_name: "large-v3"
    language: "en"
    batch_size: 16
  transcription_alignment:
    model_name: "WAV2VEC2_ASR_BASE_960H"
  sentence_transformer:
    model_name: "all-MiniLM-L12-v2"
  clip:
    model_name: "ViT-L-14"
  qwen_vl:
    # --- VISION LLM OPTIONS ---
    # model_name: "Qwen/Qwen2.5-VL-3B-Instruct-AWQ" # Ultra Fast
    model_name: "Qwen/Qwen2.5-VL-7B-Instruct-AWQ"   # Recommended for 3090 (Better Detail)
  siglip:
    model_name: "google/siglip2-so400m-patch16-naflex"

keyframe_extraction:
  frames_per_scene_siglip: 5
  frames_per_scene_caption: 3
  min_frames_short_scene: 1   # scenes < 1.5s
  similarity_pooling: "top_k_mean"
  top_k: 2

retrieval:
  use_temporal_guidance: true
  temporal_weight: 0.3
  temporal_sigma: 30.0
  matching_algorithm: "dp"  # "greedy" | "hungarian" | "dp"
  
  # DP parameters
  dp_jump_penalty: 0.3
  dp_reuse_bonus: 0.3
  dp_backward_penalty: 0.5
  
  # Hungarian parameters
  hungarian_reuse_penalty: 0.2

summarization:
  max_output_duration_seconds: 90
  min_segment_duration_seconds: 3.0
  relevance_threshold: 0.7

broll:
  matching_threshold: 0.6
  max_broll_duration: 5.0

vram:
  device_id: 0
  limit_gb: 22.0 # Slightly under 24GB to be safe

llm:
  backend: "local" # Options: "groq", "local"
  groq:
    model_name: "llama-3.3-70b-versatile"
    temperature: 0.1
  local:
    # --- LLM OPTIONS (AWQ for VRAM efficiency) ---
    # model_name: "Qwen/Qwen2.5-7B-Instruct-AWQ"  # Fastest
    model_name: "Qwen/Qwen2.5-14B-Instruct-AWQ"   # Balanced (Current)
    # model_name: "Qwen/Qwen2.5-32B-Instruct-AWQ" # Smartest (Uses ~20GB VRAM)
    temperature: 0.1
  retry_count: 3

tts:
  backend: "kokoro"           # options: "kokoro", "dia"
  kokoro_voice: "af_heart"    # most expressive voice
  kokoro_speed: 1.05          # slightly faster = more energetic
  dia_model: "nari-labs/Dia-1.6B-0626"
  silence_padding_ms: 150     # was 200, tighter pacing
  loudness_lufs: -18
  sample_rate: 24000

assembly:
  clip_duration_mode: "match_audio"  # options: "full_scene", "match_audio"
  clip_buffer_seconds: 0.5
