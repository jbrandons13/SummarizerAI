# Default configuration for Video Summarizer AI Pipeline

paths:
  raw_data_dir: "data/raw"
  intermediate_dir: "data/intermediate"
  output_dir: "data/output"

models:
  whisper:
    model_name: "large-v3"
    language: "en"
    batch_size: 16
  transcription_alignment:
    model_name: "WAV2VEC2_ASR_BASE_960H"
  sentence_transformer:
    model_name: "all-MiniLM-L6-v2"
  clip:
    model_name: "ViT-B-32"
    pretrained: "laion2b_s34b_b79k"
  qwen_vl:
    model_name: "Qwen/Qwen2-VL-7B-Instruct"
  groq:
    model_name: "llama-3.1-70b-versatile"
    temperature: 0.1

summarization:
  max_output_duration_seconds: 60
  min_segment_duration_seconds: 3.0
  relevance_threshold: 0.7

broll:
  matching_threshold: 0.6
  max_broll_duration: 5.0

vram:
  device_id: 0
  limit_gb: 22.0 # Slightly under 24GB to be safe

llm:
  backend: "groq" # Options: "groq", "local"
  groq:
    model_name: "llama-3.3-70b-versatile"
    temperature: 0.1
  local:
    model_name: "Qwen/Qwen2.5-14B-Instruct-AWQ"
    temperature: 0.1
  retry_count: 3

tts:
  backend: "kokoro" # "kokoro" or "f5tts"
  sample_rate: 24000
  padding_ms: 200
  target_lufs: -18.0
  voices:
    english: "af_heart"
    indonesian: "default" # F5-TTS will use Indonesian if backend supports it
