
llm:
  backend: local
  groq:
    model_name: llama-3.3-70b-versatile
    temperature: 0.0
  local:
    model_name: Qwen/Qwen2.5-14B-Instruct-AWQ
    temperature: 0.0
  retry_count: 3
models:
  clip:
    model_name: ViT-L-14
  qwen_vl:
    model_name: Qwen/Qwen2.5-VL-7B-Instruct-AWQ
  sentence_transformer:
    model_name: all-MiniLM-L12-v2
  siglip:
    model_name: google/siglip2-so400m-patch16-naflex
  transcription_alignment:
    model_name: WAV2VEC2_ASR_BASE_960H
  whisper:
    batch_size: 16
    language: en
    model_name: large-v3
paths:
  intermediate_dir: data/intermediate
  output_dir: data/output
  raw_data_dir: data/raw

summarization:
  max_output_duration_seconds: 240
  min_segment_duration_seconds: 3.0
  relevance_threshold: 0.7
subtitle:
  enabled: true
  style: "FontName=Liberation Sans,FontSize=20,PrimaryColour=&H00FFFFFF,BackColour=&H80000000,BorderStyle=4,Outline=0,Shadow=0,MarginV=30"
tts:
  backend: kokoro
  dia_model: nari-labs/Dia-1.6B-0626
  kokoro_speed: 1.05
  kokoro_voice: af_heart
  loudness_lufs: -18
  sample_rate: 24000
  silence_padding_ms: 150
vram:
  device_id: 0
  limit_gb: 22.0

phase4:
  anchor_policy:
    default: "semantic_triggered"
    fixed_interval:
      k: 5
    semantic:
      embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
      threshold_chain: 0.75
      threshold_soft: 0.55
  image_gen:
    backend: "sdxl"
    base_model: "stabilityai/stable-diffusion-xl-base-1.0"
    negative_prompt: "split screen, diptych, two panels, side by side, comparison, divided frame, multiple panels, watermark, text, low quality"
    cartoon_lora:
      repo_or_path: "models/loras/flat_color_anime_xl_v2.safetensors"
      trigger_words: "fca style"
      weight: 0.8
    ip_adapter:
      repo: "h94/IP-Adapter"
      subfolder: "sdxl_models"
      weight_name: "ip-adapter-plus_sdxl_vit-h.safetensors"
    generation_resolution: [1344, 768]
    output_resolution: [832, 480]
    num_inference_steps: 30
    guidance_scale: 7.0
    soft_chain_ref_weight: 0.4
    concept_anchor_ref_weight: 0.5
    ip_reference_prep: crop

  video_gen:
    backend: "comfyui_wan_flf2v_gguf"
    comfyui:
      host: "127.0.0.1"
      port: 8188
      comfyui_path: "~/comfyui/ComfyUI"
    model:
      unet: "wan2.1-flf2v-14b-720p-Q5_K_M.gguf"
      text_encoder: "split_files/text_encoders/umt5_xxl_fp8_e4m3fn_scaled.safetensors"
      vae: "split_files/vae/wan_2.1_vae.safetensors"
      clip_vision: "split_files/clip_vision/clip_vision_h.safetensors"
    generation:
      width: 832
      height: 480
      num_frames: 81
      fps: 16.0
      steps: 30
      cfg: 5.5
      sampler: "uni_pc"
      scheduler: "simple"
    recovery:
      max_oom_retries: 2
      health_check_every_n_shots: 5
      free_vram_between_shots: true
